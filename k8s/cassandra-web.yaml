---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra-web
  namespace: default
  labels:
    app: cassandra-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra-web
  template:
    metadata:
      labels:
        app: cassandra-web
    spec:
      containers:
        - name: cassandra-web
          image: cassandra-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CASSANDRA_HOST
              value: "cassandra:9042"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-web
  namespace: default
  labels:
    app: cassandra-web
spec:
  type: NodePort
  selector:
    app: cassandra-web
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30092
      name: http
