apiVersion: apps/v1
kind: Deployment
metadata:
  name: cassandra-explorer
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cassandra-explorer
  template:
    metadata:
      labels:
        app: cassandra-explorer
    spec:
      containers:
      - name: explorer
        image: cassandra-explorer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: CASSANDRA_HOST
          value: "cassandra"
        - name: CASSANDRA_PORT
          value: "9042"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra-explorer
  namespace: default
spec:
  type: NodePort
  selector:
    app: cassandra-explorer
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    nodePort: 30093
