apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbeaver
  namespace: default
  labels:
    app: dbeaver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbeaver
  template:
    metadata:
      labels:
        app: dbeaver
    spec:
      containers:
      - name: dbeaver
        image: dbeaver/cloudbeaver:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8978
          name: http
        env:
        - name: CB_SERVER_URL
          value: "http://localhost:8080"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /
            port: 8978
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8978
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: dbeaver-data
          mountPath: /opt/cloudbeaver/workspace
      volumes:
      - name: dbeaver-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dbeaver
  namespace: default
  labels:
    app: dbeaver
spec:
  type: NodePort
  selector:
    app: dbeaver
  ports:
  - name: http
    port: 8978
    targetPort: 8978
    nodePort: 30099
