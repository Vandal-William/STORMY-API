name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ======================
  # BUILD & TEST GO SERVICES
  # ======================
  build-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, message]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies and tidy
        working-directory: services/${{ matrix.service }}
        run: |
          go mod download
          go mod tidy

      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: go build -v ./...

      - name: Test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        timeout-minutes: 5
        continue-on-error: true
        run: go test -v -timeout 5m ./...

  # ======================
  # LINT GO SERVICES
  # ======================
  lint-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, message]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: golangci-lint ${{ matrix.service }}
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: services/${{ matrix.service }}
          args: --timeout=5m

  # ======================
  # BUILD & TEST NESTJS SERVICES
  # ======================
  build-nestjs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user, notification, moderation]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Generate Prisma Client
        working-directory: services/${{ matrix.service }}
        run: npx prisma generate

      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: npm run build

      - name: Lint ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: npm run lint

  # ======================
  # SONARQUBE ANALYSIS (skip si pas configuré)
  # ======================
  sonarqube:
    runs-on: ubuntu-latest
    needs: [build-go, build-nestjs]
    if: vars.SONAR_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ======================
  # DOCKER BUILD & PUSH TO ACR
  # ======================
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [build-go, build-nestjs, lint-go]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: stormyregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push GO services
        run: |
          for service in gateway message presence; do
            docker build -t stormyregistry.azurecr.io/$service-service:${{ github.sha }} \
                         -t stormyregistry.azurecr.io/$service-service:latest \
                         services/$service/
            docker push stormyregistry.azurecr.io/$service-service:${{ github.sha }}
            docker push stormyregistry.azurecr.io/$service-service:latest
          done

      - name: Build and push NestJS services
        run: |
          for service in user notification moderation; do
            docker build -t stormyregistry.azurecr.io/$service-service:${{ github.sha }} \
                         -t stormyregistry.azurecr.io/$service-service:latest \
                         services/$service/
            docker push stormyregistry.azurecr.io/$service-service:${{ github.sha }}
            docker push stormyregistry.azurecr.io/$service-service:latest
          done

  # ======================
  # DEPLOY TO AZURE AKS
  # ======================
  deploy-aks:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group StormyGroup \
            --name StormyApiCluster \
            --overwrite-existing

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update Kubernetes manifests with new image tags
        run: |
          # Remplacer les tags d'image dans les manifests k8s.prod
          sed -i "s|stormyregistry.azurecr.io/gateway-service:.*|stormyregistry.azurecr.io/gateway-service:${{ github.sha }}|g" k8s.prod/*.yaml
          sed -i "s|stormyregistry.azurecr.io/message-service:.*|stormyregistry.azurecr.io/message-service:${{ github.sha }}|g" k8s.prod/*.yaml
          sed -i "s|stormyregistry.azurecr.io/presence-service:.*|stormyregistry.azurecr.io/presence-service:${{ github.sha }}|g" k8s.prod/*.yaml
          sed -i "s|stormyregistry.azurecr.io/user-service:.*|stormyregistry.azurecr.io/user-service:${{ github.sha }}|g" k8s.prod/*.yaml
          sed -i "s|stormyregistry.azurecr.io/notification-service:.*|stormyregistry.azurecr.io/notification-service:${{ github.sha }}|g" k8s.prod/*.yaml
          sed -i "s|stormyregistry.azurecr.io/moderation-service:.*|stormyregistry.azurecr.io/moderation-service:${{ github.sha }}|g" k8s.prod/*.yaml

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s.prod/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway -n default --timeout=5m
          kubectl rollout status deployment/message-service -n default --timeout=5m
          kubectl rollout status deployment/presence -n default --timeout=5m
          kubectl rollout status deployment/user-service -n default --timeout=5m
          kubectl rollout status deployment/notification-service -n default --timeout=5m
          kubectl rollout status deployment/moderation-service -n default --timeout=5m

      - name: Verify deployment
        run: |
          echo "Deployment Status:"
          kubectl get deployments -n default
          echo ""
          echo "Running Pods:"
          kubectl get pods -n default

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful to AKS"
          else
            echo "❌ Deployment failed"
          fi
